<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thought-Search | 3D Semantic Knowledge Graph</title>
    
    <!-- Libraries -->
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Thought-Search Knowledge Graph</h1>
        <div class="header-right">
            <div class="stats" id="doc-count"></div>
            <button class="sync-btn" id="sync-btn">
                Sync DB
            </button>
        </div>
    </header>

    <main>
        <div id="plot"></div>
        <div class="legend" id="legend"></div>
        <div class="search-container">
            <input type="text" class="search-input" id="search-input" placeholder="지식 조각 검색 (제목, 태그, 내용)...">
            <div class="search-results" id="search-results"></div>
        </div>
        <div class="info-panel" id="info-panel">
            <div class="info-header">
                <div class="info-header-left">
                    <div class="info-title" id="info-title">문서 제목</div>
                </div>
                <div class="close-panel-btn" id="close-panel-btn">&times;</div>
            </div>
            <div class="info-body">
                <div class="info-path" id="info-path">path/to/document.md</div>
                <div class="info-tags" id="info-tags"></div>
                <div class="info-content" id="info-content">
                    문서 내용을 로드 중입니다...
                </div>
                <div class="related-section">
                    <div class="related-header">연관 지식 (Semantic Connections)</div>
                    <div class="related-list" id="related-list"></div>
                </div>
            </div>
        </div>
        <div class="controls">
            <div class="control-group">
                <label>연관 지식 밀도 (Threshold: <span id="threshold-val">0.80</span>)</label>
                <input type="range" id="threshold-slider" min="0.50" max="0.95" step="0.01" value="0.80">
            </div>
        </div>
        <div class="orbit-control">
            <label class="switch">
                <input type="checkbox" id="orbit-toggle" checked>
                <span class="slider round"></span>
            </label>
            <span class="orbit-label">Auto-Orbit</span>
        </div>
        <div class="hint">
            • <b>좌클릭 드래그</b>: 회전&nbsp;&nbsp;&nbsp;
            • <b>우클릭 드래그</b>: 이동&nbsp;&nbsp;&nbsp;
            • <b>휠</b>: 확대/축소&nbsp;&nbsp;&nbsp;
            • <b>점 클릭</b>: 관계망 탐색
        </div>
    </main>

    <!-- Custom Logic -->
    <script src="script.js"></script>
</body>
</html>
