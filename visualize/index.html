<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thought-Search | 3D Semantic Knowledge Graph</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.9);
            --border-color: rgba(56, 189, 248, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 1rem 2rem;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        main {
            flex: 1;
            position: relative;
            display: flex;
            overflow: hidden;
        }

        #plot {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        .info-panel {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 340px;
            max-height: calc(100% - 40px);
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 200;
            pointer-events: none;
        }

        .info-panel.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
        }

        .info-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            line-height: 1.3;
            margin-bottom: 0.75rem;
            color: var(--accent-color);
            border-left: 3px solid var(--accent-color);
            padding-left: 12px;
        }

        .info-path {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.7rem;
            color: #64748b;
            margin-bottom: 1rem;
            word-break: break-all;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 10px;
            border-radius: 6px;
        }

        .info-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1.25rem;
        }

        .tag {
            font-size: 0.65rem;
            padding: 2px 10px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .info-content {
            font-size: 0.875rem;
            line-height: 1.7;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Markdown Styling inside panel */
        .info-content h1, .info-content h2, .info-content h3, .info-content h4, .info-content h5, .info-content h6 {
            color: var(--text-primary);
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            font-family: 'Outfit', sans-serif;
        }
        .info-content h1 { font-size: 1.1rem; }
        .info-content h2 { font-size: 1rem; }
        .info-content h3 { font-size: 0.9rem; }
        .info-content h4, .info-content h5, .info-content h6 { font-size: 0.85rem; color: var(--accent-color); }
        .info-content p { margin-bottom: 1rem; }
        .info-content ul { padding-left: 1.2rem; margin-bottom: 1rem; }
        .info-content li { margin-bottom: 0.4rem; }
        .info-content code {
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: #e2e8f0;
        }
        .info-content pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .info-content pre code {
            background: none;
            padding: 0;
        }

        .search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            z-index: 100;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
            width: 450px;
            transform: translateX(-25px);
        }

        .hint {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(15, 23, 42, 0.6);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 50;
        }

        .legend {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1rem;
            z-index: 60;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        /* Plotly Customization */
        .modebar {
            display: none !important;
        }
    </style>
</head>
<body>
    <header>
        <h1>Thought-Search Knowledge Graph</h1>
        <div class="stats" id="doc-count">Initializing...</div>
    </header>

    <main>
        <div id="plot"></div>
        <div class="legend" id="legend"></div>
        <div class="search-container">
            <input type="text" class="search-input" id="search-input" placeholder="지식 조각 검색 (제목, 태그, 내용)...">
        </div>
        <div class="info-panel" id="info-panel">
            <div class="info-title" id="info-title">문서 제목</div>
            <div class="info-path" id="info-path">path/to/document.md</div>
            <div class="info-tags" id="info-tags"></div>
            <div class="info-content" id="info-content">
                문서 내용을 로드 중입니다...
            </div>
        </div>
        <div class="hint">
            • <b>좌클릭 드래그</b>: 회전&nbsp;&nbsp;&nbsp;
            • <b>우클릭 드래그</b>: 이동&nbsp;&nbsp;&nbsp;
            • <b>휠</b>: 확대/축소&nbsp;&nbsp;&nbsp;
            • <b>점 클릭</b>: 상세 정보
        </div>
    </main>

    <script>
        async function init() {
            try {
                // Configure marked.js with KaTeX
                marked.use(markedKatex({
                    throwOnError: false
                }));
                
                marked.setOptions({
                    gfm: true,
                    breaks: true,
                    headerIds: false,
                    mangle: false
                });

                const response = await fetch('/data/viz-data.json');
                const data = await response.json();
                const nodes = data.nodes;
                const edges = data.edges;
                const categories = data.categories;
                
                document.getElementById('doc-count').textContent = `${nodes.length} Nodes & ${edges.length} Semantic Connections`;

                // Build Legend
                const legendContainer = document.getElementById('legend');
                for (const [cat, color] of Object.entries(categories)) {
                    const item = document.createElement('div');
                    item.className = 'legend-item';
                    item.innerHTML = `
                        <div class="legend-color" style="background: ${color}"></div>
                        <span>${cat}</span>
                    `;
                    legendContainer.appendChild(item);
                }

                // 1. Nodes Trace
                const nodeTrace = {
                    x: nodes.map(n => n.x),
                    y: nodes.map(n => n.y),
                    z: nodes.map(n => n.z),
                    text: nodes.map(n => n.metadata.title || n.metadata.filename),
                    mode: 'markers',
                    type: 'scatter3d',
                    marker: {
                        size: nodes.map(n => n.size),
                        color: nodes.map(n => n.color),
                        opacity: 0.9,
                        line: { color: 'rgba(255, 255, 255, 0.1)', width: 0.5 }
                    },
                    hoverinfo: 'text'
                };

                // 2. Edges Trace (Lines)
                const edgeX = [];
                const edgeY = [];
                const edgeZ = [];
                
                edges.forEach(edge => {
                    const source = nodes[edge[0]];
                    const target = nodes[edge[1]];
                    edgeX.push(source.x, target.x, null);
                    edgeY.push(source.y, target.y, null);
                    edgeZ.push(source.z, target.z, null);
                });

                const edgeTrace = {
                    x: edgeX,
                    y: edgeY,
                    z: edgeZ,
                    mode: 'lines',
                    type: 'scatter3d',
                    line: {
                        color: 'rgba(56, 189, 248, 0.2)',
                        width: 1
                    },
                    hoverinfo: 'none'
                };

                const layout = {
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                    margin: { t: 0, r: 0, b: 0, l: 0 },
                    scene: {
                        xaxis: { showgrid: false, zeroline: false, showticklabels: false, title: '' },
                        yaxis: { showgrid: false, zeroline: false, showticklabels: false, title: '' },
                        zaxis: { showgrid: false, zeroline: false, showticklabels: false, title: '' },
                        camera: {
                            eye: { x: 1.5, y: 1.5, z: 1.5 }
                        }
                    },
                    showlegend: false
                };

                const config = {
                    responsive: true,
                    displayModeBar: false,
                    scrollZoom: true
                };

                Plotly.newPlot('plot', [edgeTrace, nodeTrace], layout, config);

                // --- Search Logic ---
                const searchInput = document.getElementById('search-input');
                searchInput.addEventListener('input', function() {
                    const query = this.value.toLowerCase();
                    
                    if (!query) {
                        // Reset all to normal
                        Plotly.restyle('plot', {
                            'marker.opacity': [0.9],
                            'marker.size': [nodes.map(n => n.size)]
                        }, [1]);
                        return;
                    }

                    const matches = nodes.map(n => {
                        const title = (n.metadata.title || "").toLowerCase();
                        const tags = (n.metadata.tags || []).join(" ").toLowerCase();
                        const text = (n.text || "").toLowerCase();
                        return title.includes(query) || tags.includes(query) || text.includes(query);
                    });

                    const opacities = matches.map(m => m ? 1.0 : 0.05);
                    const sizes = matches.map((m, i) => m ? nodes[i].size * 1.5 : 2);

                    Plotly.restyle('plot', {
                        'marker.opacity': [opacities],
                        'marker.size': [sizes]
                    }, [1]);
                });

                const plotDiv = document.getElementById('plot');
                const panel = document.getElementById('info-panel');

                // Using 'plotly_click' for a more stable interaction in 3D
                plotDiv.on('plotly_click', function(eventData) {
                    if (!eventData.points || eventData.points.length === 0) return;
                    
                    const p = eventData.points[0];
                    // Ensure we clicked on a node (markers), not an edge (lines)
                    if (p.fullData.mode !== 'markers') return;
                    
                    const pointIndex = p.pointNumber;
                    const item = nodes[pointIndex];
                    if (!item) return;
                    
                    document.getElementById('info-title').textContent = item.metadata.title || item.metadata.filename;
                    document.getElementById('info-path').textContent = item.metadata.rel_path;
                    
                    // Pre-process Markdown: Remove brackets around headings like [#### Title]
                    let processedContent = item.text;
                    processedContent = processedContent.replace(/^\[(#{1,6}.+?)\]/gm, '$1');
                    
                    const rawContent = processedContent.substring(0, 1500) + (processedContent.length > 1500 ? '...' : '');
                    document.getElementById('info-content').innerHTML = marked.parse(rawContent);
                    
                    const tagsContainer = document.getElementById('info-tags');
                    tagsContainer.innerHTML = '';
                    if (item.metadata.tags) {
                        item.metadata.tags.forEach(tag => {
                            const span = document.createElement('span');
                            span.className = 'tag';
                            span.textContent = tag;
                            tagsContainer.appendChild(span);
                        });
                    }

                    panel.classList.add('active');
                });

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('doc-count').textContent = 'Error loading data.';
            }
        }

        init();
    </script>
</body>
</html>
