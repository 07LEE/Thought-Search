<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thought-Search | 3D Semantic Knowledge Graph</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.9);
            --border-color: rgba(56, 189, 248, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 1rem 2rem;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        main {
            flex: 1;
            position: relative;
            display: flex;
            overflow: hidden;
        }

        #plot {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        .info-panel {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 380px;
            max-height: calc(100% - 40px);
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            overflow-y: auto;
            opacity: 0;
            transform: translateX(40px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 200;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        .info-panel.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
        }

        .info-header {
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem 1.5rem 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .info-header-left {
            flex: 1;
            padding-right: 2rem;
        }

        .close-panel-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 1.4rem;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .close-panel-btn:hover {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
            transform: scale(1.1);
        }

        .info-body {
            padding: 1.5rem;
        }

        .info-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.35rem;
            line-height: 1.3;
            margin-bottom: 0.75rem;
            color: var(--accent-color);
            border-left: 4px solid var(--accent-color);
            padding-left: 14px;
        }

        .info-path {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.7rem;
            color: #64748b;
            margin-bottom: 1rem;
            word-break: break-all;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 10px;
            border-radius: 6px;
        }

        .info-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1.25rem;
        }

        .tag {
            font-size: 0.65rem;
            padding: 2px 10px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .info-content {
            font-size: 0.875rem;
            line-height: 1.7;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Markdown Styling inside panel */
        .info-content h1, .info-content h2, .info-content h3, .info-content h4, .info-content h5, .info-content h6 {
            color: var(--text-primary);
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            font-family: 'Outfit', sans-serif;
        }
        .info-content h1 { font-size: 1.1rem; }
        .info-content h2 { font-size: 1rem; }
        .info-content h3 { font-size: 0.9rem; }
        .info-content h4, .info-content h5, .info-content h6 { font-size: 0.85rem; color: var(--accent-color); }
        .info-content p { margin-bottom: 1rem; }
        .info-content ul { padding-left: 1.2rem; margin-bottom: 1rem; }
        .info-content li { margin-bottom: 0.4rem; }
        .info-content code {
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: #e2e8f0;
        }
        .info-content pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .info-content pre code {
            background: none;
            padding: 0;
        }

        /* Markdown Table Styling */
        .info-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-content th {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            text-align: left;
            padding: 10px 12px;
            font-weight: 600;
            border-bottom: 2px solid rgba(56, 189, 248, 0.3);
        }

        .info-content td {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
        }

        .info-content tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        .info-content tr:hover {
            background: rgba(56, 189, 248, 0.05);
        }

        .info-content blockquote {
            margin: 1.5rem 0;
            padding: 0.5rem 1rem;
            border-left: 4px solid var(--accent-color);
            background: rgba(56, 189, 248, 0.05);
            font-style: italic;
            border-radius: 0 8px 8px 0;
        }

        .search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            z-index: 100;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
            width: 450px;
            transform: translateX(-25px);
        }

        .hint {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(15, 23, 42, 0.6);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 50;
        }

        .legend {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1rem;
            z-index: 60;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .related-section {
            margin-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 1rem;
        }

        .related-header {
            font-size: 0.8rem;
            color: var(--accent-color);
            margin-bottom: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .related-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .related-item {
            font-size: 0.8rem;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .related-item:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: rgba(56, 189, 248, 0.3);
            transform: translateX(5px);
        }

        /* Plotly Customization */
        .modebar {
            display: none !important;
        }
    </style>
</head>
<body>
    <header>
        <h1>Thought-Search Knowledge Graph</h1>
        <div class="stats" id="doc-count">Initializing...</div>
    </header>

    <main>
        <div id="plot"></div>
        <div class="legend" id="legend"></div>
        <div class="search-container">
            <input type="text" class="search-input" id="search-input" placeholder="지식 조각 검색 (제목, 태그, 내용)...">
        </div>
        <div class="info-panel" id="info-panel">
            <div class="info-header">
                <div class="info-header-left">
                    <div class="info-title" id="info-title">문서 제목</div>
                </div>
                <div class="close-panel-btn" id="close-panel-btn">&times;</div>
            </div>
            <div class="info-body">
                <div class="info-path" id="info-path">path/to/document.md</div>
                <div class="info-tags" id="info-tags"></div>
                <div class="info-content" id="info-content">
                    문서 내용을 로드 중입니다...
                </div>
                <div class="related-section">
                    <div class="related-header">연관 지식 (Semantic Connections)</div>
                    <div class="related-list" id="related-list"></div>
                </div>
            </div>
        </div>
        <div class="hint">
            • <b>좌클릭 드래그</b>: 회전&nbsp;&nbsp;&nbsp;
            • <b>우클릭 드래그</b>: 이동&nbsp;&nbsp;&nbsp;
            • <b>휠</b>: 확대/축소&nbsp;&nbsp;&nbsp;
            • <b>점 클릭</b>: 관계망 탐색
        </div>
    </main>

    <script>
        let globalNodes = [];
        let globalEdges = [];
        let globalIntraEdges = [];
        let originalEdgeX = [], originalEdgeY = [], originalEdgeZ = [];
        let originalIntraX = [], originalIntraY = [], originalIntraZ = [];
        let isUpdating = false;

        async function init() {
            try {
                marked.use(markedKatex({ throwOnError: false }));
                marked.setOptions({ gfm: true, breaks: true, headerIds: false, mangle: false });

                const response = await fetch('/data/viz-data.json');
                const data = await response.json();
                globalNodes = data.nodes;
                globalEdges = data.edges;
                globalIntraEdges = data.intra_file_edges || [];
                const categories = data.categories;
                
                document.getElementById('doc-count').textContent = `${globalNodes.length} Nodes | ${globalEdges.length} Semantic & ${globalIntraEdges.length} Structural Links`;

                const legendContainer = document.getElementById('legend');
                // Section for Line Types with Toggles
                const lineLegend = document.createElement('div');
                lineLegend.style.marginBottom = '1rem';
                lineLegend.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
                lineLegend.style.paddingBottom = '0.75rem';
                lineLegend.innerHTML = `
                    <div style="font-size: 0.7rem; color: #64748b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">Connection Filters</div>
                    <div class="legend-item" style="cursor: pointer; justify-content: space-between;" onclick="document.getElementById('toggle-semantic').click()">
                        <div style="display: flex; align-items: center;">
                            <div class="legend-color" style="background: #38bdf8; margin-right: 12px;"></div>
                            <span>주제 연관성 (Semantic)</span>
                        </div>
                        <input type="checkbox" id="toggle-semantic" checked style="margin-left: 8px; cursor: pointer;">
                    </div>
                    <div class="legend-item" style="cursor: pointer; justify-content: space-between;" onclick="document.getElementById('toggle-intra').click()">
                        <div style="display: flex; align-items: center;">
                            <div class="legend-color" style="background: #fbbf24; margin-right: 12px;"></div>
                            <span>문서 구조 (Intra-file)</span>
                        </div>
                        <input type="checkbox" id="toggle-intra" checked style="margin-left: 8px; cursor: pointer;">
                    </div>
                `;
                legendContainer.appendChild(lineLegend);

                document.getElementById('toggle-semantic').addEventListener('change', function(e) {
                    Plotly.restyle('plot', { visible: e.target.checked }, [0]);
                });
                document.getElementById('toggle-intra').addEventListener('change', function(e) {
                    Plotly.restyle('plot', { visible: e.target.checked }, [1]);
                });

                for (const [cat, color] of Object.entries(categories)) {
                    const item = document.createElement('div');
                    item.className = 'legend-item';
                    item.innerHTML = `<div class="legend-color" style="background: ${color}"></div><span>${cat}</span>`;
                    legendContainer.appendChild(item);
                }

                const nodeTrace = {
                    x: globalNodes.map(n => n.x),
                    y: globalNodes.map(n => n.y),
                    z: globalNodes.map(n => n.z),
                    text: globalNodes.map(n => n.metadata.title || n.metadata.filename),
                    mode: 'markers',
                    type: 'scatter3d',
                    marker: {
                        size: globalNodes.map(n => n.size),
                        color: globalNodes.map(n => n.color),
                        opacity: 0.9,
                        line: { color: 'rgba(255, 255, 255, 0.1)', width: 0.5 }
                    },
                    hoverinfo: 'text'
                };

                globalEdges.forEach(edge => {
                    const s = globalNodes[edge[0]], t = globalNodes[edge[1]];
                    originalEdgeX.push(s.x, t.x, null); originalEdgeY.push(s.y, t.y, null); originalEdgeZ.push(s.z, t.z, null);
                });
                const edgeTrace = {
                    x: originalEdgeX, y: originalEdgeY, z: originalEdgeZ,
                    mode: 'lines', type: 'scatter3d',
                    line: { color: 'rgba(56, 189, 248, 0.15)', width: 1 },
                    hoverinfo: 'none'
                };

                globalIntraEdges.forEach(edge => {
                    const s = globalNodes[edge[0]], t = globalNodes[edge[1]];
                    originalIntraX.push(s.x, t.x, null); originalIntraY.push(s.y, t.y, null); originalIntraZ.push(s.z, t.z, null);
                });
                const intraTrace = {
                    x: originalIntraX, y: originalIntraY, z: originalIntraZ,
                    mode: 'lines', type: 'scatter3d',
                    line: { color: 'rgba(251, 191, 36, 0.3)', width: 0.8 },
                    hoverinfo: 'none'
                };

                const layout = {
                    paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
                    margin: { t: 0, r: 0, b: 0, l: 0 },
                    scene: {
                        xaxis: { showgrid: false, zeroline: false, showticklabels: false, title: '' },
                        yaxis: { showgrid: false, zeroline: false, showticklabels: false, title: '' },
                        zaxis: { showgrid: false, zeroline: false, showticklabels: false, title: '' },
                    },
                    showlegend: false
                };

                Plotly.newPlot('plot', [edgeTrace, intraTrace, nodeTrace], layout, { responsive: true, displayModeBar: false });

                const searchInput = document.getElementById('search-input');
                searchInput.addEventListener('input', function() {
                    const query = this.value.toLowerCase();
                    if (!query) { resetView(); return; }
                    const matches = globalNodes.map(n => {
                        const title = (n.metadata.title || "").toLowerCase();
                        const tags = (n.metadata.tags || []).join(" ").toLowerCase();
                        const text = (n.text || "").toLowerCase();
                        return title.includes(query) || tags.includes(query) || text.includes(query);
                    });
                    Plotly.restyle('plot', {
                        'marker.opacity': [matches.map(m => m ? 1.0 : 0.05)],
                        'marker.size': [matches.map((m, i) => m ? globalNodes[i].size * 1.5 : 2)]
                    }, [2]);
                    Plotly.restyle('plot', { 'line.color': 'rgba(0,0,0,0)' }, [0, 1]);
                });

                const plotDiv = document.getElementById('plot');
                plotDiv.on('plotly_click', function(eventData) {
                    if (isUpdating) return;
                    if (!eventData || !eventData.points || eventData.points.length === 0) { resetView(); return; }
                    const p = eventData.points[0];
                    if (p.fullData.mode !== 'markers') { resetView(); return; }
                    highlightNode(p.pointNumber);
                });

                document.getElementById('close-panel-btn').onclick = resetView;
                window.addEventListener('keydown', e => { if (e.key === 'Escape') resetView(); });

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('doc-count').textContent = 'Error loading data.';
            }
        }

        async function highlightNode(index) {
            if (isUpdating) return;
            isUpdating = true;
            try {
                const item = globalNodes[index];
                if (!item) return;

                document.getElementById('info-title').textContent = item.metadata.title || item.metadata.filename;
                document.getElementById('info-path').textContent = item.metadata.rel_path;
                let processedContent = item.text.replace(/^\[(#{1,6}.+?)\]/gm, '$1');
                document.getElementById('info-content').innerHTML = marked.parse(processedContent.substring(0, 1000));
                
                const tagsContainer = document.getElementById('info-tags');
                tagsContainer.innerHTML = '';
                (item.metadata.tags || []).forEach(tag => {
                    const span = document.createElement('span');
                    span.className = 'tag';
                    span.textContent = tag;
                    tagsContainer.appendChild(span);
                });

                const connectedIndices = new Set();
                const hX = [], hY = [], hZ = [];
                globalEdges.forEach(edge => {
                    if (edge[0] === index || edge[1] === index) {
                        connectedIndices.add(edge[0] === index ? edge[1] : edge[0]);
                        const s = globalNodes[edge[0]], t = globalNodes[edge[1]];
                        hX.push(s.x, t.x, null); hY.push(s.y, t.y, null); hZ.push(s.z, t.z, null);
                    }
                });

                const fileX = [], fileY = [], fileZ = [];
                const currentRelPath = item.metadata.rel_path;
                globalIntraEdges.forEach(edge => {
                    if (globalNodes[edge[0]].metadata.rel_path === currentRelPath) {
                        const s = globalNodes[edge[0]], t = globalNodes[edge[1]];
                        fileX.push(s.x, t.x, null); fileY.push(s.y, t.y, null); fileZ.push(s.z, t.z, null);
                    }
                });

                const relatedList = document.getElementById('related-list');
                relatedList.innerHTML = '';
                if (connectedIndices.size === 0) {
                    relatedList.innerHTML = '<div style="font-size: 0.75rem; color: #64748b;">연결된 지식이 없습니다.</div>';
                } else {
                    connectedIndices.forEach(idx => {
                        const neighbor = globalNodes[idx];
                        const div = document.createElement('div');
                        div.className = 'related-item';
                        div.textContent = neighbor.metadata.title || neighbor.metadata.filename;
                        div.onclick = (e) => { e.stopPropagation(); highlightNode(idx); };
                        relatedList.appendChild(div);
                    });
                }

                await Plotly.restyle('plot', {
                    'marker.opacity': [globalNodes.map((n, i) => (i === index || n.metadata.rel_path === currentRelPath || connectedIndices.has(i)) ? 1.0 : 0.05)],
                    'marker.size': [globalNodes.map((n, i) => i === index ? n.size * 2 : (n.metadata.rel_path === currentRelPath ? n.size * 1.3 : (connectedIndices.has(i) ? n.size * 1.5 : 2)))]
                }, [2]);

                await Plotly.restyle('plot', {
                    'x': [hX.length ? hX : [null]], 'y': [hY.length ? hY : [null]], 'z': [hZ.length ? hZ : [null]],
                    'line.color': 'rgba(56, 189, 248, 0.8)', 'line.width': 3
                }, [0]);

                await Plotly.restyle('plot', {
                    'x': [fileX.length ? fileX : [null]], 'y': [fileY.length ? fileY : [null]], 'z': [fileZ.length ? fileZ : [null]],
                    'line.color': 'rgba(251, 191, 36, 0.8)', 'line.width': 2
                }, [1]);

                document.getElementById('info-panel').classList.add('active');
            } catch (e) { console.error('Highlight error:', e); }
            finally { setTimeout(() => { isUpdating = false; }, 100); }
        }

        async function resetView() {
            if (isUpdating) return;
            isUpdating = true;
            try {
                await Plotly.restyle('plot', {
                    'marker.opacity': [globalNodes.map(() => 0.9)],
                    'marker.size': [globalNodes.map(n => n.size)],
                    'marker.color': [globalNodes.map(n => n.color)]
                }, [2]);

                await Plotly.restyle('plot', {
                    'x': [originalEdgeX], 'y': [originalEdgeY], 'z': [originalEdgeZ],
                    'line.color': 'rgba(56, 189, 248, 0.15)', 'line.width': 1
                }, [0]);

                await Plotly.restyle('plot', {
                    'x': [originalIntraX], 'y': [originalIntraY], 'z': [originalIntraZ],
                    'line.color': 'rgba(251, 191, 36, 0.3)', 'line.width': 0.8
                }, [1]);

                document.getElementById('info-panel').classList.remove('active');
                document.getElementById('search-input').value = '';
            } catch (e) { console.error('Reset error:', e); }
            finally { setTimeout(() => { isUpdating = false; }, 100); }
        }

        init();
    </script>
</body>
</html>
